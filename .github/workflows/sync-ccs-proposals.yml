name: Sync CCS Proposals Repository

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Clone source repository (all branches)
        run: |
          rm -rf tmp-ccs-proposals
          git clone --mirror https://repo.getmonero.org/monero-project/ccs-proposals.git tmp-ccs-proposals

      - name: Push to current repository
        run: |
          cd tmp-ccs-proposals
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git --all --force
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git --tags --force